plugins {
    id 'java-library'
    id 'io.qameta.allure' version '4.0.2'
}

allure {
    report {
        version.set("2.29.0")
    }
    adapter { // отвечает за появление каталога build/allure-results
        aspectjWeaver.set(true) //обработка аннотации @Step
        frameworks {
            junit5 {
                adapterVersion.set("2.29.0")
            }
        }
    }
}


group = 'ru.solnyshko'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}


dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'com.codeborne:selenide:7.15.0'
    testImplementation 'io.qameta.allure:allure-selenide:2.33.0'
    testImplementation 'org.slf4j:slf4j-simple:2.0.17'
    implementation 'com.github.javafaker:javafaker:1.0.2'

}

tasks.withType(Test) {
    useJUnitPlatform()
    systemProperties(System.getProperties())

    testLogging {
        lifecycle {
            events "started", "skipped", "failed", "standard_error", "standard_out"
            exceptionFormat "short"
        }
    }
}